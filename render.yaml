databases:
  - name: alshatibi-db
    region: frankfurt
    plan: free
    databaseName: alshatibi

services:
  # Backend Service (يبقى كما هو)
  - type: web
    name: alshatibi-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: alshatibi-db
          property: connectionString
    healthCheckPath: /api/health

  # Frontend Service (نوع static بدون plan)
  - type: static
    name: alshatibi-frontend
    rootDir: customer-app
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: alshatibi-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
